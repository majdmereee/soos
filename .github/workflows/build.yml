name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. إعداد جافا لبيئة البناء
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'
          cache: true

      # 4. جلب مكاتب وتحديثات المشروع
      - name: Install dependencies
        run: flutter pub get

      # 5. بناء تطبيق الـ APK (نسخة الإصدار الكاملة)
      - name: Build APK
        run: flutter build apk --release

      # 6. رفع التطبيق الناتج كملف قابل للتحميل Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: instant-sos-app
          path: build/app/outputs/flutter-apk/app-release.apk
